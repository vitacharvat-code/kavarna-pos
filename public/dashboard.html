<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="theme-color" content="#1a1a1a">
  <link rel="manifest" href="/manifest.json">
  <title>Kavárna — Přehled</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="dashboard-layout">
  <div class="dash-header">
    <h1>Přehled dne</h1>
    <div class="dash-controls">
      <input type="date" class="date-picker" id="datePicker">
      <span class="refresh-info" id="refreshInfo"></span>
    </div>
  </div>

  <div class="stats-grid">
    <div class="stat-card">
      <div class="stat-label">Objednávky</div>
      <div class="stat-value" id="statOrders">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Celkový obrat</div>
      <div class="stat-value accent" id="statTotal">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Hotovost</div>
      <div class="stat-value cash" id="statCash">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">Na účet</div>
      <div class="stat-value card" id="statCard">—</div>
    </div>
  </div>

  <div class="section-title">Prodané položky</div>
  <div id="itemsSection"><div class="no-data">Načítám...</div></div>
</div>

<nav class="bottom-nav">
  <a href="/" class="nav-item">
    <span class="nav-icon">☕</span>
    <span>Pokladna</span>
  </a>
  <a href="/dashboard.html" class="nav-item active">
    <span class="nav-icon">📊</span>
    <span>Přehled</span>
  </a>
  <a href="/admin.html" class="nav-item">
    <span class="nav-icon">⚙️</span>
    <span>Správa</span>
  </a>
</nav>

<script src="dashboard.js"></script>
</body>
</html>
